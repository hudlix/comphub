# CompHub — one-command local run, mock mode, zero credentials.
#   docker compose up   →  web on http://localhost:3000, api on http://localhost:4000
#
# Both services build from the monorepo root context so the workspace packages are
# available. The api uses an embedded store (SQLite) by default — no external database
# needed just to try it. Point COMPHUB_DB at Postgres for a real deployment.

services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      COMPHUB_MODE: mock                 # mock adapters on; no credentials required
      COMPHUB_DB: "sqlite:///data/comphub.db"
      PORT: "4000"
    volumes:
      - comphub-data:/data
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 3s
      retries: 5

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      COMPHUB_API_URL: "http://localhost:4000"
      PORT: "3000"
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy

volumes:
  comphub-data:
